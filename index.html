<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参加希望カレンダー（4月〜5月）</title>

<style>
body { font-family: sans-serif; margin: 10px; }
h2 { text-align: center; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.header {
  font-weight: bold;
  text-align: center;
  padding: 5px;
  background: #f0f0f0;
}

.day {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 6px;
  min-height: 100px;
}

.sat { background: #e0f4ff; }
.sun { background: #ffe6ea; }
.holiday { background: #ffe6ea; }

.date { font-size: 12px; font-weight: bold; }

.names span {
  display:block;
  font-size:12px;
  margin-top:2px;
  background:#e0f0ff;
  border-radius:4px;
  padding:2px;
}

button {
  margin-top:5px;
  width:100%;
  font-size:12px;
}
</style>
</head>

<body>

<h2>参加希望カレンダー（2026年4月〜5月）</h2>
<div id="calendar" class="calendar"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAeqz0DS20ux7MWpmXrQA5x3rZ4KysrET8",
  authDomain: "triangle-29fbf.firebaseapp.com",
  projectId: "triangle-29fbf",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const calendar = document.getElementById("calendar");

// 曜日ヘッダー
["月","火","水","木","金","土","日"].forEach(day => {
  const div = document.createElement("div");
  div.className = "header";
  div.textContent = day;
  calendar.appendChild(div);
});

// 日付をローカルで生成（これが重要）
function formatDateLocal(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// 祝日取得
async function getHolidays() {
  const res = await fetch("https://holidays-jp.github.io/api/v1/date.json");
  return await res.json();
}

async function createCalendar() {
  const holidays = await getHolidays();

  // 2026年4月1日
  const firstDay = new Date(2026, 3, 1);

  // 月曜スタートに調整
  const start = new Date(firstDay);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7));

  for (let i = 0; i < 70; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);

    const key = formatDateLocal(d); // ←修正ポイント
    const day = d.getDay();

    const isSunday = day === 0;
    const isSaturday = day === 6;
    const isHoliday = holidays[key];

    const div = document.createElement("div");
    div.className = "day";

    if (isHoliday) {
      div.classList.add("holiday");
    } else if (isSunday) {
      div.classList.add("sun");
    } else if (isSaturday) {
      div.classList.add("sat");
    }

    div.innerHTML = `
      <div class="date">${key}</div>
      <div class="names" id="names-${key}"></div>
      <button onclick="addName('${key}')">＋参加</button>
    `;

    calendar.appendChild(div);

    onSnapshot(doc(db, "dates", key), (docSnap) => {
      const container = document.getElementById("names-" + key);
      container.innerHTML = "";

      if (docSnap.exists()) {
        const names = docSnap.data().names || [];

        names.forEach(name => {
          const span = document.createElement("span");
          span.textContent = name;

          span.onclick = async () => {
            if (confirm(name + " を削除しますか？")) {
              await updateDoc(doc(db, "dates", key), {
                names: arrayRemove(name)
              });
            }
          };

          container.appendChild(span);
        });
      }
    });
  }
}

window.addName = async function(key) {
  const name = prompt("名前を入力してください");
  if (!name) return;

  const ref = doc(db, "dates", key);
  const docSnap = await getDoc(ref);

  if (docSnap.exists() && docSnap.data().names?.includes(name)) {
    alert("すでに登録されています");
    return;
  }

  await setDoc(ref, {
    names: arrayUnion(name)
  }, { merge: true });
};

createCalendar();
</script>

</body>
</html>
