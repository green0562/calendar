<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参加希望カレンダー</title>

<style>
body { font-family: sans-serif; margin: 10px; }

.month-title {
  font-weight: bold;
  font-size: 18px;
  margin: 20px 0 5px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.header {
  text-align: center;
  font-weight: bold;
  background: #f0f0f0;
  padding: 5px;
}

.day {
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 90px;
  padding: 5px;
}

.empty {
  background: transparent;
  border: none;
}

.sat { background: #e0f4ff; }
.sun { background: #ffe6ea; }
.holiday { background: #ffe6ea; }

.date { font-size: 12px; font-weight: bold; }

.names span {
  display:block;
  font-size:11px;
  margin-top:2px;
  background:#e0f0ff;
  border-radius:4px;
  padding:2px;
}

button {
  width:100%;
  margin-top:3px;
  font-size:11px;
}
</style>
</head>

<body>

<h2>参加希望カレンダー（2026年4月〜5月）</h2>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAeqz0DS20ux7MWpmXrQA5x3rZ4KysrET8",
  authDomain: "triangle-29fbf.firebaseapp.com",
  projectId: "triangle-29fbf",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const appDiv = document.getElementById("app");

function formatDateLocal(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

async function getHolidays() {
  const res = await fetch("https://holidays-jp.github.io/api/v1/date.json");
  return await res.json();
}

function createMonth(year, month, holidays) {
  const container = document.createElement("div");

  // タイトル
  const title = document.createElement("div");
  title.className = "month-title";
  title.textContent = `${year}年${month + 1}月`;
  container.appendChild(title);

  // カレンダー
  const cal = document.createElement("div");
  cal.className = "calendar";

  // 曜日ヘッダー
  ["月","火","水","木","金","土","日"].forEach(d => {
    const div = document.createElement("div");
    div.className = "header";
    div.textContent = d;
    cal.appendChild(div);
  });

  const firstDay = new Date(year, month, 1);
  const lastDate = new Date(year, month + 1, 0).getDate();

  // 空白（前）
  let startOffset = (firstDay.getDay() + 6) % 7;
  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement("div");
    empty.className = "day empty";
    cal.appendChild(empty);
  }

  // 日付
  for (let i = 1; i <= lastDate; i++) {
    const d = new Date(year, month, i);
    const key = formatDateLocal(d);
    const day = d.getDay();

    const div = document.createElement("div");
    div.className = "day";

    const isSun = day === 0;
    const isSat = day === 6;
    const isHoliday = holidays[key];

    if (isHoliday) {
      div.classList.add("holiday");
    } else if (isSun) {
      div.classList.add("sun");
    } else if (isSat) {
      div.classList.add("sat");
    }

    div.innerHTML = `
      <div class="date">${i}</div>
      <div class="names" id="names-${key}"></div>
      <button onclick="addName('${key}')">＋参加</button>
    `;

    cal.appendChild(div);

    onSnapshot(doc(db, "dates", key), (docSnap) => {
      const container = document.getElementById("names-" + key);
      container.innerHTML = "";

      if (docSnap.exists()) {
        docSnap.data().names.forEach(name => {
          const span = document.createElement("span");
          span.textContent = name;

          span.onclick = async () => {
            if (confirm("削除しますか？")) {
              await updateDoc(doc(db, "dates", key), {
                names: arrayRemove(name)
              });
            }
          };

          container.appendChild(span);
        });
      }
    });
  }

  container.appendChild(cal);
  return container;
}

window.addName = async function(key) {
  const name = prompt("名前を入力");
  if (!name) return;

  const ref = doc(db, "dates", key);
  const docSnap = await getDoc(ref);

  if (docSnap.exists() && docSnap.data().names?.includes(name)) {
    alert("登録済み");
    return;
  }

  await setDoc(ref, {
    names: arrayUnion(name)
  }, { merge: true });
};

async function init() {
  const holidays = await getHolidays();

  appDiv.appendChild(createMonth(2026, 3, holidays)); // 4月
  appDiv.appendChild(createMonth(2026, 4, holidays)); // 5月
}

init();
</script>

</body>
</html>
